<div class="container my-4"> <h2 class="text-center pb-3">Publicar Reto</h2>

  <div class="col-md-6 mx-auto text-center"> 
    <form id="retoForm"> 
      <input type="text" class="form-control mb-2 w-50 mx-auto" placeholder="Nombre del entrenador"> 
      <input type="text" class="form-control mb-2 w-50 mx-auto" placeholder="Región del combate">
       <input type="number" class="form-control mb-2 w-50 mx-auto" placeholder="Cantidad de Pokémon en la pelea"> 
       <input type="number" class="form-control mb-2 w-50 mx-auto" placeholder="Nivel máximo de tu Pokémon más fuerte"> 
       <input type="date" class="form-control mb-2 w-50 mx-auto"> 
       <button type="submit" class="btn btn-danger w-50 mx-auto">Enviar reto</button> </form> 
   <div id="mensaje" class="alert d-none mt-3"></div> </div> </div>

<script>
  const form = document.getElementById("retoForm");
  const mensaje = document.getElementById("mensaje");

  form.addEventListener("submit", function(event) {
    event.preventDefault();

    // alerta para el form
    mensaje.className = "alert alert-success mt-3";
    mensaje.textContent = "✅ Solicitud de reto enviada correctamente.";
    mensaje.classList.remove("d-none");

    form.reset();
  });
</script>

<hr>
      <h5 class="text-center">Mucha suerte en tu viaje, recuerda que los retos se almacenan durante 1 día o al finalizar la batalla tu reto desaparecerá.</h5>
